<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseSoul - Votre havre de paix anonyme</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --secondary: #475569;
            --secondary-hover: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        select, textarea {
            width: 100%;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: #fff;
            padding: 14px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .btn {
            width: 100%;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: block;
            text-align: center;
            text-decoration: none;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--secondary);
            font-size: 15px;
            padding: 14px;
            margin-bottom: 0;
        }

        .btn-secondary:hover {
            background: var(--secondary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .status-box {
            display: none;
            margin-top: 20px;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            color: #a7f3d0;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .code-display {
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            margin: 10px 0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">WiseSoul 🍃</div>
            <p class="subtitle">Partagez ce qui pèse sur votre cœur en toute sécurité. Aucun compte requis, anonymat 100% garanti.</p>
        </div>

        <form id="murmurForm">
            <!-- Remplacement de la clé d'accès Web3Forms publique -->
            <input type="hidden" name="access_key" value="09108d8f-5738-41e8-a295-c69e2bb3eb6e">
            
            <!-- Champs masqués pour le traitement interne -->
            <input type="hidden" name="Pseudo-anonyme" id="hiddenPseudo">
            <input type="hidden" name="Code secret de suivi" id="hiddenCode">

            <div class="form-group">
                <label for="emotion">Quelle est votre émotion dominante ?</label>
                <select name="Émotion" id="emotion">
                    <option value="Besoin de parler">Besoin de confier un secret 🤫</option>
                    <option value="Triste">Triste ou Mélancolique 😢</option>
                    <option value="Anxieux">Anxieux ou Stressé 😟</option>
                    <option value="Submerger">Submergé ou Perdu 🌊</option>
                    <option value="Isole">Isolé ou Seul 🏚️</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Votre murmure</label>
                <textarea name="Message" id="message" placeholder="Écrivez librement ici ce que vous ressentez..." required></textarea>
            </div>

            <div class="form-group">
                <label for="location">Votre Ville ou Localisation (Optionnel)</label>
                <input type="text" name="Localisation" id="location" placeholder="Ex: Lomé, Paris, Abidjan...">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Envoyer mon murmure</button>
        </form>

        <!-- Nouveau bouton pour accéder directement aux réponses -->
        <a href="reponses.html" class="btn btn-secondary">Consulter une réponse existante</a>

        <div id="statusBox" class="status-box"></div>
    </div>

    <script>
        // Listes pour générer des pseudonymes poétiques et uniques
        const adjectifs = ["Serein", "Silencieux", "Résilient", "Secret", "Apaisé", "Lumineux", "Profond", "Vagabond", "Timide"];
        const noms = ["Souffle", "Écho", "Rêveur", "Murmure", "Passant", "Esprit", "Voyageur", "Cœur", "Regard"];

        // Fonction utilitaire pour générer des identifiants uniques
        function genererInfosAnonymes() {
            const adj = adjectifs[Math.floor(Math.random() * adjectifs.length)];
            const nom = noms[Math.floor(Math.random() * noms.length)];
            const nombre = Math.floor(100 + Math.random() * 900); // 3 chiffres
            const codeChiffres = Math.floor(1000 + Math.random() * 9000); // 4 chiffres

            return {
                pseudo: `${adj}${nom}${nombre}`,
                code: `WS-${codeChiffres}`
            };
        }

        const form = document.getElementById('murmurForm');
        const statusBox = document.getElementById('statusBox');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Désactiver le bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.innerText = "Envoi en cours...";

            // Génération des données d'anonymat pour cette soumission
            const anonyme = genererInfosAnonymes();
            document.getElementById('hiddenPseudo').value = anonyme.pseudo;
            document.getElementById('hiddenCode').value = anonyme.code;

            const formData = new FormData(form);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    statusBox.className = "status-box status-success";
                    statusBox.innerHTML = `
                        <p style="font-weight:bold; font-size:16px; margin-bottom:8px;">✨ Murmure envoyé avec succès !</p>
                        <p>Votre pseudo temporaire : <strong>${anonyme.pseudo}</strong></p>
                        <p>Voici votre code secret unique pour consulter la réponse du thérapeute :</p>
                        <div class="code-display">${anonyme.code}</div>
                        <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">⚠️ Notez bien ce code. Sans lui, vous ne pourrez pas lire votre réponse.</p>
                    `;
                    form.reset();
                } else {
                    console.log(json);
                    statusBox.className = "status-box status-error";
                    statusBox.innerText = json.message;
                }
            })
            .catch(error => {
                console.log(error);
                statusBox.className = "status-box status-error";
                statusBox.innerText = "Une erreur réseau est survenue. Veuillez réessayer.";
            })
            .then(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Envoyer mon murmure";
                statusBox.style.display = "block";
                statusBox.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
