<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseSoul - Votre havre de paix anonyme</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .identity-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .identity-box span {
            font-weight: bold;
            color: var(--accent);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .emotion-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .emotion-btn {
            background: #334155;
            border: 2px solid transparent;
            color: var(--text-main);
            padding: 10px 5px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
        }

        .emotion-btn.selected {
            background: var(--accent);
            border-color: #fff;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 14px;
            color: var(--text-main);
            padding: 12px;
            font-size: 15px;
            resize: none;
            margin-bottom: 16px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        input[type="text"] {
            width: 100%;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 14px;
            color: var(--text-main);
            padding: 12px;
            font-size: 15px;
            margin-bottom: 24px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">WiseSoul 🍃</div>
            <div class="subtitle">Votre espace d'expression libre et sécurisé</div>
        </header>

        <!-- Générateur de pseudo automatique -->
        <div class="identity-box">
            Votre identité secrète actuelle : <span id="pseudoDisplay">Génération...</span>
        </div>

        <!-- Formulaire connecté à Web3Forms -->
        <form action="https://api.web3forms.com/submit" method="POST">
            <!-- Clé d'accès unique -->
            <input type="hidden" name="access_key" value="09108d8f-5738-41e8-a295-c69e2bb3eb6e">
            <!-- Redirection vers ton site après envoi -->
            <input type="hidden" name="redirect" value="https://wisesoul.onrender.com">

            <label>Votre météo intérieure :</label>
            <div class="emotion-selector">
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'Submergé')">Submergé</button>
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'Isolé')">Isolé</button>
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'Triste')">Triste</button>
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'En Colère')">En Colère</button>
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'Anxieux')">Anxieux</button>
                <button type="button" class="emotion-btn" onclick="selectEmotion(this, 'Besoin d\'aide')">Besoin d'aide</button>
            </div>
            
            <!-- Champs invisibles transmis dans l'e-mail -->
            <input type="hidden" name="Emotion" id="hiddenEmotion">
            <input type="hidden" name="Pseudo Anonyme" id="hiddenPseudo">
            
            <label for="message">Votre murmure :</label>
            <textarea name="Message" id="message" placeholder="Racontez librement ce que vous traversez actuellement..." required></textarea>
            
            <label for="location">Ville ou Pays (Optionnel) :</label>
            <input type="text" name="Localisation" id="location" placeholder="Ex: Paris, Lomé, Abidjan...">
            
            <button type="submit" class="submit-btn">Envoyer mon murmure à l'abri</button>
        </form>
    </div>

    <script>
        // Liste de pseudos poétiques pour préserver l'anonymat complet
        const adjectifs = ["Silencieux", "Résilient", "Apaisé", "Courageux", "Secret", "Étoilé", "Profond", "Serein"];
        const noms = ["Voyageur", "Esprit", "Souffle", "Rêveur", "Nuage", "Écho", "Phare", "Pensée"];

        // Génération du pseudo unique
        const adj = adjectifs[Math.floor(Math.random() * adjectifs.length)];
        const nom = noms[Math.floor(Math.random() * noms.length)];
        const num = Math.floor(Math.random() * 900) + 100;
        const monPseudo = `${adj}${nom}${num}`;

        // Affichage sur l'écran et assignation au champ caché du mail
        document.getElementById('pseudoDisplay').innerText = monPseudo;
        document.getElementById('hiddenPseudo').value = monPseudo;

        let emotionSelectionnee = "";

        function selectEmotion(button, emotion) {
            // Nettoyer la sélection précédente
            document.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('selected'));
            // Activer le bouton cliqué
            button.classList.add('selected');
            // Mettre à jour la valeur pour le formulaire
            emotionSelectionnee = emotion;
            document.getElementById('hiddenEmotion').value = emotion;
        }

        // Vérification de sécurité au moment de l'envoi
        document.querySelector('form').addEventListener('submit', function(e) {
            if (!emotionSelectionnee) {
                e.preventDefault();
                alert("S'il vous plaît, sélectionnez une émotion dans votre météo intérieure avant d'envoyer.");
            }
        });
    </script>
</body>
</html>
